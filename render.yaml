services:
  - type: web
    name: studio-app
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PEXELS_API_KEY
        sync: false
      - key: PIXABAY_API_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_TTS_KEY
        sync: false
